name: Daily Design News Research

on:
  schedule:
    # 22:30 UTC = 07:30 KST (다음날) — 한국시간 매일 오전 7시 30분
    - cron: '30 22 * * *'
  workflow_dispatch: {} # Actions 탭에서 수동 실행도 가능

permissions:
  contents: write

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-save

      - name: Run research script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run research

      - name: Commit and push if changed
        run: |
          git config user.name "design-today-bot"
          git config user.email "bot@users.noreply.github.com"
          git add public/data
          git diff --staged --quiet || git commit -m "chore: 오늘의 디자인·IT 뉴스 업데이트"
          git push
